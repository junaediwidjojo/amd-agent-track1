services:
  agent:
    build:
      context: .
      platforms:
        - linux/amd64
    platform: linux/amd64
    env_file:
      - .env
    volumes:
      - ./input:/input:ro
      - ./output:/output
    environment:
      - INPUT_PATH=/input/tasks.json
      - OUTPUT_PATH=/output/results.json
      - LOCAL_CATEGORIES=sentiment,summarization,ner
      - PROMPT_CACHE_ENABLED=false
      - MAX_RUNTIME_SECONDS=480
      - LOCAL_N_CTX=2048
